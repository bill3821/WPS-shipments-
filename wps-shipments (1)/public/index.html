<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPS Shipments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --wps-red: #D42427;
    --wps-red-bright: #E82D30;
    --wps-red-light: #FEF0F0;
    --wps-red-medium: #FCDADA;
    --wps-red-glow: rgba(212,36,39,0.12);

    --bg: #FFFFFF;
    --bg-page: #F6F6F8;
    --bg-card: #FFFFFF;
    --bg-card-hover: #FAFAFA;
    --bg-input: #F4F4F6;
    --bg-sidebar: #FBFBFC;

    --border: #E8E8EC;
    --border-light: #F0F0F3;
    --border-focus: var(--wps-red);

    --text-primary: #1A1A1F;
    --text-secondary: #6B6B76;
    --text-muted: #9B9BA6;
    --text-light: #B8B8C0;

    --green: #16A34A;
    --green-bg: #ECFDF5;
    --green-border: #BBF7D0;
    --amber: #D97706;
    --amber-bg: #FFFBEB;
    --amber-border: #FDE68A;
    --red: #DC2626;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --purple: #7C3AED;
    --purple-bg: #F5F3FF;
    --cyan: #0891B2;

    --radius: 10px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 60px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo img { height: 40px; width: auto; border-radius: 3px; }
  .logo-divider { width: 1px; height: 24px; background: var(--border); }
  .logo-text { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 16px;
    font-size: 10px; font-weight: 600; color: var(--green);
    font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--green); border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(22,163,74,0.3); }
    50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(22,163,74,0); }
  }
  .clock { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); }

  /* LAYOUT */
  .main { display: grid; grid-template-columns: 340px 1fr; flex: 1; }

  /* SIDEBAR */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 2px;
    font-family: 'Space Mono', monospace;
  }
  .btn-add {
    background: var(--wps-red); color: white; border: none;
    padding: 6px 14px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .btn-add:hover { background: var(--wps-red-bright); box-shadow: 0 2px 8px var(--wps-red-glow); }

  .shipment-list { flex: 1; overflow-y: auto; padding: 8px; }
  .shipment-list::-webkit-scrollbar { width: 4px; }
  .shipment-list::-webkit-scrollbar-track { background: transparent; }
  .shipment-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .shipment-card {
    background: var(--bg-card); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 12px 13px;
    margin-bottom: 4px; cursor: pointer; transition: all 0.12s;
    position: relative; overflow: hidden;
  }
  .shipment-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .shipment-card.st-in-transit::before { background: var(--wps-red); }
  .shipment-card.st-delivered::before { background: var(--green); }
  .shipment-card.st-delayed::before { background: var(--amber); }
  .shipment-card.st-scheduled::before { background: var(--text-light); }
  .shipment-card.st-loading::before { background: var(--purple); }
  .shipment-card:hover { background: var(--bg-card-hover); border-color: var(--border); box-shadow: var(--shadow-sm); }
  .shipment-card.active {
    border-color: var(--wps-red);
    background: var(--wps-red-light);
    box-shadow: 0 0 0 1px var(--wps-red), var(--shadow-sm);
  }

  .sc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .sc-id { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--wps-red); font-weight: 700; }
  .sc-tracking { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); }
  .sc-job { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
  .sc-route { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sc-route .arr { color: var(--wps-red); margin: 0 4px; font-weight: 700; }
  .sc-bottom { display: flex; align-items: center; justify-content: space-between; }

  .status-pill {
    font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
    text-transform: uppercase; letter-spacing: 0.6px; font-family: 'Space Mono', monospace;
  }
  .status-pill.in-transit { background: var(--wps-red-light); color: var(--wps-red); border: 1px solid var(--wps-red-medium); }
  .status-pill.delivered { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .status-pill.delayed { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .status-pill.scheduled { background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border); }
  .status-pill.loading { background: var(--purple-bg); color: var(--purple); border: 1px solid #DDD6FE; }

  .sc-date { font-size: 10px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

  /* CONTENT */
  .content { padding: 20px 24px; overflow-y: auto; background: var(--bg-page); }

  .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-card:nth-child(1) .stat-value { color: var(--wps-red); }
  .stat-card:nth-child(2) .stat-value { color: var(--green); }
  .stat-card:nth-child(3) .stat-value { color: var(--text-secondary); }
  .stat-card:nth-child(4) .stat-value { color: var(--amber); }
  .stat-card:nth-child(5) .stat-value { color: var(--wps-red); }

  /* PANELS */
  .detail-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel-card {
    background: var(--bg-card); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow-sm);
  }
  .panel-card.full-width { grid-column: 1 / -1; }
  .panel-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); font-family: 'Space Mono', monospace;
    margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
  }
  .panel-title .icon { font-size: 14px; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .detail-item label {
    display: block; font-size: 9px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    font-family: 'Space Mono', monospace; margin-bottom: 2px;
  }
  .detail-item span { font-size: 13px; font-weight: 500; color: var(--text-primary); }

  .progress-container { margin-top: 16px; }
  .progress-labels {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-secondary); margin-bottom: 7px;
    font-family: 'Space Mono', monospace;
  }
  .progress-track { width: 100%; height: 6px; background: var(--bg-input); border-radius: 3px; overflow: visible; position: relative; }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--wps-red), var(--wps-red-bright));
    transition: width 0.6s ease; position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px; background: var(--wps-red-bright); border-radius: 50%;
    border: 2.5px solid white;
    box-shadow: 0 0 0 1px var(--wps-red-glow), 0 1px 4px rgba(0,0,0,0.1);
  }

  /* Weather strip */
  .weather-strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .weather-strip::-webkit-scrollbar { height: 3px; }
  .weather-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .wx-point {
    flex: 1; min-width: 130px;
    background: var(--bg-page); border-radius: var(--radius-sm);
    padding: 11px; border: 1px solid var(--border-light); position: relative;
  }
  .wx-point::after {
    content: '→'; position: absolute; right: -10px; top: 50%;
    transform: translateY(-50%); color: var(--wps-red); font-size: 12px; font-weight: 700;
  }
  .wx-point:last-child::after { display: none; }
  .wx-label { font-size: 10px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
  .wx-temp { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
  .wx-desc { font-size: 10px; color: var(--text-secondary); margin-bottom: 5px; }
  .wx-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; font-size: 9px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

  /* Alerts */
  .alert-item {
    padding: 10px; border-radius: var(--radius-sm);
    margin-bottom: 5px; border-left: 3px solid;
    display: flex; gap: 9px; align-items: flex-start;
  }
  .alert-item.severe { background: var(--red-bg); border-color: var(--red); }
  .alert-item.moderate { background: var(--amber-bg); border-color: var(--amber); }
  .alert-item.minor { background: #F0FDFA; border-color: var(--cyan); }
  .alert-item.clear { background: var(--green-bg); border-color: var(--green); }
  .alert-icon { font-size: 15px; flex-shrink: 0; }
  .alert-title { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .alert-desc { font-size: 10px; color: var(--text-secondary); line-height: 1.4; }

  .impact-meter { margin-top: 10px; padding: 11px; background: var(--bg-page); border-radius: var(--radius-sm); border: 1px solid var(--border-light); }
  .impact-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-bottom: 5px; }
  .impact-bar-track { width: 100%; height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
  .impact-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .impact-bar-fill.low { background: var(--green); width: 20%; }
  .impact-bar-fill.moderate { background: var(--amber); width: 50%; }
  .impact-bar-fill.high { background: var(--wps-red); width: 75%; }
  .impact-bar-fill.severe { background: var(--red); width: 100%; }
  .impact-text { font-size: 11px; font-weight: 600; }
  .impact-text.low { color: var(--green); }
  .impact-text.moderate { color: var(--amber); }
  .impact-text.high { color: var(--wps-red); }
  .impact-text.severe { color: var(--red); }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); backdrop-filter: blur(4px);
    z-index: 200; justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 26px; width: 640px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 {
    font-size: 18px; font-weight: 700;
    margin-bottom: 16px; color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
  }
  .modal h2::before { content: ''; display: inline-block; width: 4px; height: 20px; background: var(--wps-red); border-radius: 2px; }
  .form-group { margin-bottom: 10px; }
  .form-group label {
    display: block; font-size: 10px; color: var(--text-secondary);
    margin-bottom: 3px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; font-family: 'Space Mono', monospace;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px 11px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary);
    font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none;
    transition: all 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--wps-red); box-shadow: 0 0 0 3px var(--wps-red-glow);
    background: white;
  }
  .form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-light); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-section {
    font-size: 10px; font-weight: 700; color: var(--wps-red);
    text-transform: uppercase; letter-spacing: 1.5px; margin: 14px 0 6px;
    font-family: 'Space Mono', monospace;
    padding-bottom: 4px; border-bottom: 1px solid var(--border-light);
  }

  .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: white;
    color: var(--text-secondary); font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .btn-cancel:hover { background: var(--bg-input); }
  .btn-submit {
    padding: 8px 22px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: none; background: var(--wps-red); color: white;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .btn-submit:hover { background: var(--wps-red-bright); box-shadow: 0 2px 10px var(--wps-red-glow); }

  .btn-delete {
    background: white; border: 1px solid var(--red-border);
    color: var(--red); padding: 5px 11px; border-radius: var(--radius-sm);
    font-size: 10px; cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.12s;
  }
  .btn-delete:hover { background: var(--red-bg); }
  .btn-edit-status {
    background: white; border: 1px solid var(--border);
    color: var(--text-secondary); padding: 5px 11px; border-radius: var(--radius-sm);
    font-size: 10px; cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.12s;
  }
  .btn-edit-status:hover { border-color: var(--wps-red); color: var(--wps-red); }

  .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 400px; color: var(--text-muted); text-align: center;
  }
  .empty-state .es-icon { font-size: 38px; margin-bottom: 10px; }
  .empty-state h3 { font-size: 15px; margin-bottom: 4px; color: var(--text-secondary); }
  .empty-state p { font-size: 12px; }

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--wps-red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 18px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-data-msg { padding: 14px; text-align: center; color: var(--text-muted); font-size: 11px; }

  .contact-link { color: var(--wps-red); text-decoration: none; font-weight: 500; }
  .contact-link:hover { text-decoration: underline; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: slideIn 0.2s ease forwards; }

  @media (max-width: 1100px) { .stats-bar { grid-template-columns: repeat(3, 1fr); } .detail-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } .sidebar { max-height: 260px; } .detail-panel { grid-template-columns: 1fr; } .stats-bar { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <img src="/wps-logo.png" alt="WPS">
      <div class="logo-divider"></div>
      <div class="logo-text">Shipments</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div> Live Sync</div>
      <div class="clock" id="clock"></div>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Shipments</div>
        <button class="btn-add" onclick="openModal()">+ New</button>
      </div>
      <div class="shipment-list" id="shipmentList"></div>
    </aside>
    <div class="content" id="content">
      <div class="stats-bar" id="statsBar"></div>
      <div id="detailArea">
        <div class="empty-state">
          <div class="es-icon">📦</div>
          <h3>No shipment selected</h3>
          <p>Add a shipment or click one from the sidebar.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>New Shipment</h2>
    <div class="form-group">
      <label>Job / Project Name *</label>
      <input type="text" id="fJobName" placeholder="e.g. Google HQ 3rd Floor Renovation">
    </div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group"><label>Load Plan #</label><input type="text" id="fLoadPlan" placeholder="e.g. LP-2026-0412"></div>
      <div class="form-group"><label>Tracking / Shipping #</label><input type="text" id="fTracking" placeholder="e.g. 1Z999AA1012345"></div>
      <div class="form-group"><label>Carrier</label><input type="text" id="fCarrier" placeholder="e.g. XPO Logistics"></div>
    </div>
    <div class="form-section">Origin Address</div>
    <div class="form-group"><label>Street Address</label><input type="text" id="fOriginAddr" placeholder="e.g. 1234 Industrial Blvd"></div>
    <div class="form-row">
      <div class="form-group"><label>City *</label><input type="text" id="fOriginCity" placeholder="e.g. Dallas"></div>
      <div class="form-group"><label>State / Province *</label><input type="text" id="fOriginState" placeholder="e.g. TX"></div>
    </div>
    <div class="form-section">Destination Address</div>
    <div class="form-group"><label>Street Address</label><input type="text" id="fDestAddr" placeholder="e.g. 5678 Office Park Dr"></div>
    <div class="form-row">
      <div class="form-group"><label>City *</label><input type="text" id="fDestCity" placeholder="e.g. Denver"></div>
      <div class="form-group"><label>State / Province *</label><input type="text" id="fDestState" placeholder="e.g. CO"></div>
    </div>
    <div class="form-section">Shipment Details</div>
    <div class="form-row">
      <div class="form-group"><label>Ship Date</label><input type="date" id="fShipDate"></div>
      <div class="form-group"><label>Est. Arrival Date</label><input type="date" id="fArrival"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Status</label>
        <select id="fStatus"><option value="scheduled">Scheduled</option><option value="loading">Loading</option><option value="in-transit">In Transit</option><option value="delayed">Delayed</option><option value="delivered">Delivered</option></select>
      </div>
      <div class="form-group"><label>Driver Name</label><input type="text" id="fDriver" placeholder="e.g. Mike Rodriguez"></div>
    </div>
    <div class="form-group"><label>Driver Phone</label><input type="tel" id="fDriverPhone" placeholder="e.g. (214) 555-1234"></div>
    <div class="form-section">Site Contact Info</div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group"><label>Contact Name</label><input type="text" id="fContactName" placeholder="e.g. John Smith"></div>
      <div class="form-group"><label>Contact Phone</label><input type="tel" id="fContactPhone" placeholder="e.g. (303) 555-6789"></div>
      <div class="form-group"><label>Contact Email</label><input type="email" id="fContactEmail" placeholder="e.g. john@company.com"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="Wall types, quantities, special handling..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="addShipment()">Add Shipment</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModalOverlay">
  <div class="modal">
    <h2>Edit Shipment</h2>
    <div class="form-group"><label>Job / Project Name *</label><input type="text" id="eJobName"></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group"><label>Load Plan #</label><input type="text" id="eLoadPlan"></div>
      <div class="form-group"><label>Tracking / Shipping #</label><input type="text" id="eTracking"></div>
      <div class="form-group"><label>Carrier</label><input type="text" id="eCarrier"></div>
    </div>
    <div class="form-section">Origin Address</div>
    <div class="form-group"><label>Street Address</label><input type="text" id="eOriginAddr"></div>
    <div class="form-row">
      <div class="form-group"><label>City *</label><input type="text" id="eOriginCity"></div>
      <div class="form-group"><label>State / Province *</label><input type="text" id="eOriginState"></div>
    </div>
    <div class="form-section">Destination Address</div>
    <div class="form-group"><label>Street Address</label><input type="text" id="eDestAddr"></div>
    <div class="form-row">
      <div class="form-group"><label>City *</label><input type="text" id="eDestCity"></div>
      <div class="form-group"><label>State / Province *</label><input type="text" id="eDestState"></div>
    </div>
    <div class="form-section">Shipment Details</div>
    <div class="form-row">
      <div class="form-group"><label>Ship Date</label><input type="date" id="eShipDate"></div>
      <div class="form-group"><label>Est. Arrival Date</label><input type="date" id="eArrival"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Status</label>
        <select id="eStatus"><option value="scheduled">Scheduled</option><option value="loading">Loading</option><option value="in-transit">In Transit</option><option value="delayed">Delayed</option><option value="delivered">Delivered</option></select>
      </div>
      <div class="form-group"><label>Driver Name</label><input type="text" id="eDriver"></div>
    </div>
    <div class="form-group"><label>Driver Phone</label><input type="tel" id="eDriverPhone"></div>
    <div class="form-section">Site Contact Info</div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group"><label>Contact Name</label><input type="text" id="eContactName"></div>
      <div class="form-group"><label>Contact Phone</label><input type="tel" id="eContactPhone"></div>
      <div class="form-group"><label>Contact Email</label><input type="email" id="eContactEmail"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="eNotes" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-submit" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  let shipments=[], selectedId=null, weatherCache={}, lastHash='';
  const API='';

  function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});}
  setInterval(updateClock,1000);updateClock();

  function originStr(s){return[s.originAddress,s.originCity,s.originState].filter(Boolean).join(', ')||s.origin||'';}
  function destStr(s){return[s.destAddress,s.destCity,s.destState].filter(Boolean).join(', ')||s.destination||'';}
  function shortOrigin(s){return[s.originCity,s.originState].filter(Boolean).join(', ')||s.origin||'?';}
  function shortDest(s){return[s.destCity,s.destState].filter(Boolean).join(', ')||s.destination||'?';}

  async function fetchShipments(force){
    try{
      const fresh=await(await fetch(API+'/api/shipments')).json();
      const h=JSON.stringify(fresh);
      if(!force && h===lastHash) return;
      lastHash=h; shipments=fresh;
      renderList(); renderStats();
      if(selectedId){const s=shipments.find(x=>x.id===selectedId);if(s)renderDetail(s);else{selectedId=null;renderEmpty();}}
    }catch(e){console.error(e);}
  }

  async function addShipment(){
    const d={jobName:document.getElementById('fJobName').value,loadPlanNumber:document.getElementById('fLoadPlan').value,trackingNumber:document.getElementById('fTracking').value,carrier:document.getElementById('fCarrier').value,originAddress:document.getElementById('fOriginAddr').value,originCity:document.getElementById('fOriginCity').value,originState:document.getElementById('fOriginState').value,destAddress:document.getElementById('fDestAddr').value,destCity:document.getElementById('fDestCity').value,destState:document.getElementById('fDestState').value,shipDate:document.getElementById('fShipDate').value,estArrival:document.getElementById('fArrival').value,status:document.getElementById('fStatus').value,driver:document.getElementById('fDriver').value,driverPhone:document.getElementById('fDriverPhone').value,contactName:document.getElementById('fContactName').value,contactPhone:document.getElementById('fContactPhone').value,contactEmail:document.getElementById('fContactEmail').value,notes:document.getElementById('fNotes').value};
    if(!d.jobName||!d.originCity||!d.destCity)return alert('Job name, origin city, and destination city are required.');
    const r=await fetch(API+'/api/shipments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
    const ns=await r.json();closeModal();await fetchShipments(true);selectShipment(ns.id);
  }

  async function deleteShipment(id){if(!confirm('Delete this shipment?'))return;await fetch(API+`/api/shipments/${id}`,{method:'DELETE'});selectedId=null;await fetchShipments(true);renderEmpty();}
  async function updateStatus(id,status){await fetch(API+`/api/shipments/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});await fetchShipments(true);}

  async function fetchWeather(s){const o=originStr(s),d=destStr(s),k=o+'|'+d;if(weatherCache[k]&&(Date.now()-weatherCache[k].ts<600000))return weatherCache[k].data;try{const r=await fetch(API+`/api/weather?origin=${encodeURIComponent(o)}&destination=${encodeURIComponent(d)}`);const data=await r.json();weatherCache[k]={data,ts:Date.now()};return data;}catch(e){return null;}}

  function renderList(){
    const el=document.getElementById('shipmentList');
    if(!shipments.length){el.innerHTML='<div class="empty-state" style="height:160px"><p style="font-size:11px">No shipments yet.</p></div>';return;}
    el.innerHTML=shipments.map(s=>`
      <div class="shipment-card st-${s.status} ${s.id===selectedId?'active':''}" onclick="selectShipment('${s.id}')">
        <div class="sc-top"><span class="sc-id">${s.id}</span><span class="sc-tracking">${s.loadPlanNumber?'LP: '+s.loadPlanNumber:(s.trackingNumber||'')}</span></div>
        <div class="sc-job">${s.jobName||'—'}</div>
        <div class="sc-route">${shortOrigin(s)} <span class="arr">→</span> ${shortDest(s)}</div>
        <div class="sc-bottom"><span class="status-pill ${s.status}">${s.status.replace('-',' ')}</span><span class="sc-date">${s.shipDate||'—'}</span></div>
      </div>`).join('');
  }

  function renderStats(){
    const el=document.getElementById('statsBar'),t=shipments.length,it=shipments.filter(s=>s.status==='in-transit').length,sc=shipments.filter(s=>s.status==='scheduled'||s.status==='loading').length,dl=shipments.filter(s=>s.status==='delayed').length,dv=shipments.filter(s=>s.status==='delivered').length;
    el.innerHTML=`<div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${t}</div></div><div class="stat-card"><div class="stat-label">Delivered</div><div class="stat-value">${dv}</div></div><div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-value">${sc}</div></div><div class="stat-card"><div class="stat-label">Delayed</div><div class="stat-value">${dl}</div></div><div class="stat-card"><div class="stat-label">In Transit</div><div class="stat-value">${it}</div></div>`;
  }

  function renderEmpty(){document.getElementById('detailArea').innerHTML='<div class="empty-state"><div class="es-icon">📦</div><h3>No shipment selected</h3><p>Add or select a shipment.</p></div>';}
  async function selectShipment(id){selectedId=id;renderList();const s=shipments.find(x=>x.id===id);if(s)renderDetail(s);}

  function getProgress(s){
    if(s.status==='delivered')return 100;if(s.status==='scheduled')return 0;if(s.status==='loading')return 5;
    if(!s.shipDate)return s.status==='in-transit'?50:30;
    const ship=new Date(s.shipDate+'T00:00:00'),now=new Date(),arrive=s.estArrival?new Date(s.estArrival+'T00:00:00'):new Date(ship.getTime()+7*86400000);
    const total=arrive.getTime()-ship.getTime(),elapsed=now.getTime()-ship.getTime();
    if(total<=0)return 95;return Math.max(0,Math.min(98,Math.round((elapsed/total)*100)));
  }

  function getDaysRemaining(s){
    if(s.status==='delivered')return'Delivered';
    const arrive=s.estArrival?new Date(s.estArrival+'T00:00:00'):(s.shipDate?new Date(new Date(s.shipDate+'T00:00:00').getTime()+7*86400000):null);
    if(!arrive)return'—';const diff=Math.ceil((arrive.getTime()-Date.now())/86400000);
    if(diff<0)return`${Math.abs(diff)}d overdue`;if(diff===0)return'Arriving today';return`${diff}d remaining`;
  }

  function wxIcon(c){if(c<=3)return'☀️';if(c<=48)return'☁️';if(c<=67)return'🌧️';if(c<=77)return'🌨️';if(c<=82)return'🌧️';if(c<=86)return'❄️';if(c<=99)return'⛈️';return'🌤️';}

  async function renderDetail(s){
    const area=document.getElementById('detailArea'),pct=getProgress(s),dl=getDaysRemaining(s);
    const ec=dl.includes('overdue')?'var(--red)':dl.includes('today')?'var(--amber)':'var(--green)';
    area.innerHTML=`
      <div class="detail-panel animate-in">
        <div class="panel-card full-width">
          <div class="detail-header">
            <div class="panel-title"><span class="icon">📋</span> Shipment Details</div>
            <div style="display:flex;gap:5px"><button class="btn-edit-status" onclick="openEditModal('${s.id}')">Edit</button><button class="btn-delete" onclick="deleteShipment('${s.id}')">Delete</button></div>
          </div>
          <div class="detail-grid">
            <div class="detail-item"><label>Shipment ID</label><span style="font-family:'Space Mono',monospace;color:var(--wps-red);font-weight:700">${s.id}</span></div>
            <div class="detail-item"><label>Load Plan #</label><span style="font-family:'Space Mono',monospace;color:var(--purple);font-weight:600">${s.loadPlanNumber||'—'}</span></div>
            <div class="detail-item"><label>Tracking #</label><span style="font-family:'Space Mono',monospace;color:var(--cyan);font-weight:600">${s.trackingNumber||'—'}</span></div>
            <div class="detail-item"><label>Job / Project</label><span>${s.jobName||'—'}</span></div>
            <div class="detail-item"><label>Carrier</label><span>${s.carrier||'—'}</span></div>
            <div class="detail-item"><label>Status</label><span class="status-pill ${s.status}" style="display:inline-block">${s.status.replace('-',' ')}</span></div>
            <div class="detail-item" style="grid-column:1/-1"><label>Origin</label><span>${originStr(s)||'—'}</span></div>
            <div class="detail-item" style="grid-column:1/-1"><label>Destination</label><span>${destStr(s)||'—'}</span></div>
            <div class="detail-item"><label>Ship Date</label><span>${s.shipDate||'—'}</span></div>
            <div class="detail-item"><label>Est. Arrival</label><span>${s.estArrival||'—'}</span></div>
            <div class="detail-item"><label>ETA</label><span style="color:${ec};font-weight:600">${dl}</span></div>
          </div>
          <div class="progress-container">
            <div class="progress-labels"><span>${shortOrigin(s)}</span><span>${pct}% · ${dl}</span><span>${shortDest(s)}</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="panel-card"><div class="panel-title"><span class="icon">🚛</span> Driver</div><div class="detail-grid" style="grid-template-columns:1fr"><div class="detail-item"><label>Name</label><span>${s.driver||'—'}</span></div><div class="detail-item"><label>Phone</label><span>${s.driverPhone?`<a href="tel:${s.driverPhone}" class="contact-link">${s.driverPhone}</a>`:'—'}</span></div></div></div>
        <div class="panel-card"><div class="panel-title"><span class="icon">📞</span> Site Contact</div><div class="detail-grid" style="grid-template-columns:1fr"><div class="detail-item"><label>Name</label><span>${s.contactName||'—'}</span></div><div class="detail-item"><label>Phone</label><span>${s.contactPhone?`<a href="tel:${s.contactPhone}" class="contact-link">${s.contactPhone}</a>`:'—'}</span></div><div class="detail-item"><label>Email</label><span>${s.contactEmail?`<a href="mailto:${s.contactEmail}" class="contact-link">${s.contactEmail}</a>`:'—'}</span></div></div></div>
        ${s.notes?`<div class="panel-card full-width"><div class="panel-title"><span class="icon">📝</span> Notes</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.5">${s.notes}</div></div>`:''}
        <div class="panel-card full-width" id="weatherPanel"><div class="panel-title"><span class="icon">🌤️</span> Route Weather</div><div class="spinner"></div></div>
        <div class="panel-card full-width" id="alertPanel"><div class="panel-title"><span class="icon">⚠️</span> Alerts &amp; Trucking Impact</div><div class="spinner"></div></div>
      </div>`;
    const w=await fetchWeather(s);renderWeather(w);renderAlerts(w);
  }

  function renderWeather(data){
    const p=document.getElementById('weatherPanel');
    if(!data||!data.points||!data.points.length){p.innerHTML=`<div class="panel-title"><span class="icon">🌤️</span> Route Weather</div><div class="no-data-msg">Could not load weather. Ensure city + state are filled in.</div>`;return;}
    p.innerHTML=`<div class="panel-title"><span class="icon">🌤️</span> Route Weather · ${data.points.length} Checkpoints</div><div class="weather-strip">${data.points.map(pt=>`<div class="wx-point"><div class="wx-label">${wxIcon(pt.weatherCode)} ${pt.label}</div><div class="wx-temp">${pt.tempF}°F</div><div class="wx-desc">${pt.description}</div><div class="wx-stats"><span>💨 ${pt.windMph} mph</span><span>💧 ${pt.precipIn}"</span><span>👁 ${pt.visMiles} mi</span><span>🌬 ${pt.gustMph} gust</span></div></div>`).join('')}</div>`;
  }

  function renderAlerts(data){
    const p=document.getElementById('alertPanel');
    if(!data){p.innerHTML=`<div class="panel-title"><span class="icon">⚠️</span> Alerts</div><div class="no-data-msg">No data.</div>`;return;}
    let h='';
    if(data.alerts?.length){h=data.alerts.map(a=>{let c='minor';if(a.severity==='Severe'||a.severity==='Extreme')c='severe';else if(a.severity==='Moderate')c='moderate';return`<div class="alert-item ${c}"><div class="alert-icon">${c==='severe'?'🔴':c==='moderate'?'🟡':'🔵'}</div><div><div class="alert-title">${a.event}</div><div class="alert-desc">${a.headline||''}</div></div></div>`;}).join('');}
    else{h=`<div class="alert-item clear"><div class="alert-icon">✅</div><div><div class="alert-title">No Active Alerts</div><div class="alert-desc">No severe weather warnings on this route.</div></div></div>`;}
    const im=data.impact||{level:'low',text:'No data.'};
    p.innerHTML=`<div class="panel-title"><span class="icon">⚠️</span> Alerts &amp; Trucking Impact</div>${h}<div class="impact-meter"><div class="impact-label">Trucking Impact</div><div class="impact-bar-track"><div class="impact-bar-fill ${im.level}"></div></div><div class="impact-text ${im.level}">${im.level.toUpperCase()} — ${im.text}</div></div>`;
  }

  function openModal(){document.getElementById('modalOverlay').classList.add('show');['fJobName','fLoadPlan','fTracking','fCarrier','fOriginAddr','fOriginCity','fOriginState','fDestAddr','fDestCity','fDestState','fShipDate','fArrival','fDriver','fDriverPhone','fContactName','fContactPhone','fContactEmail','fNotes'].forEach(id=>{const el=document.getElementById(id);if(el.tagName==='SELECT')el.selectedIndex=0;else el.value='';});document.getElementById('fStatus').value='scheduled';}
  function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
  let editingId=null;
  function openEditModal(id){
    editingId=id;
    const s=shipments.find(x=>x.id===id);
    if(!s)return;
    document.getElementById('eJobName').value=s.jobName||'';
    document.getElementById('eLoadPlan').value=s.loadPlanNumber||'';
    document.getElementById('eTracking').value=s.trackingNumber||'';
    document.getElementById('eCarrier').value=s.carrier||'';
    document.getElementById('eOriginAddr').value=s.originAddress||'';
    document.getElementById('eOriginCity').value=s.originCity||'';
    document.getElementById('eOriginState').value=s.originState||'';
    document.getElementById('eDestAddr').value=s.destAddress||'';
    document.getElementById('eDestCity').value=s.destCity||'';
    document.getElementById('eDestState').value=s.destState||'';
    document.getElementById('eShipDate').value=s.shipDate||'';
    document.getElementById('eArrival').value=s.estArrival||'';
    document.getElementById('eStatus').value=s.status||'scheduled';
    document.getElementById('eDriver').value=s.driver||'';
    document.getElementById('eDriverPhone').value=s.driverPhone||'';
    document.getElementById('eContactName').value=s.contactName||'';
    document.getElementById('eContactPhone').value=s.contactPhone||'';
    document.getElementById('eContactEmail').value=s.contactEmail||'';
    document.getElementById('eNotes').value=s.notes||'';
    document.getElementById('editModalOverlay').classList.add('show');
  }
  function closeEditModal(){document.getElementById('editModalOverlay').classList.remove('show');}
  async function saveEdit(){
    if(!editingId)return;
    const updates={
      jobName:document.getElementById('eJobName').value,
      loadPlanNumber:document.getElementById('eLoadPlan').value,
      trackingNumber:document.getElementById('eTracking').value,
      carrier:document.getElementById('eCarrier').value,
      originAddress:document.getElementById('eOriginAddr').value,
      originCity:document.getElementById('eOriginCity').value,
      originState:document.getElementById('eOriginState').value,
      destAddress:document.getElementById('eDestAddr').value,
      destCity:document.getElementById('eDestCity').value,
      destState:document.getElementById('eDestState').value,
      shipDate:document.getElementById('eShipDate').value,
      estArrival:document.getElementById('eArrival').value,
      status:document.getElementById('eStatus').value,
      driver:document.getElementById('eDriver').value,
      driverPhone:document.getElementById('eDriverPhone').value,
      contactName:document.getElementById('eContactName').value,
      contactPhone:document.getElementById('eContactPhone').value,
      contactEmail:document.getElementById('eContactEmail').value,
      notes:document.getElementById('eNotes').value,
    };
    await fetch(API+`/api/shipments/${editingId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
    // Clear weather cache for this route in case addresses changed
    weatherCache={};
    closeEditModal();
    await fetchShipments(true);
  }
  document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.getElementById('editModalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEditModal();});
  fetchShipments(true);setInterval(fetchShipments,15000);
</script>
</body>
</html>
